<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Votação - Câmara Municipal</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
<style>
    * { box-sizing: border-box; }
    body {
        margin: 0;
        font-family: 'Roboto', sans-serif;
        background-color: #1a1a1a;
        color: white;
        display: flex;
        height: 100vh;
        overflow: hidden;
    }

    /* BARRA LATERAL (Esquerda) */
    .sidebar {
        width: 320px;
        background: linear-gradient(180deg, #001B6B 0%, #0044FF 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px 20px;
        box-shadow: 5px 0 15px rgba(0,0,0,0.5);
        z-index: 10;
        text-align: center;
        position: relative;
    }
    .sidebar img.logo {
        width: 160px;
        margin-bottom: 20px;
        filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.4));
    }
    .sidebar h1 {
        font-size: 18px;
        text-transform: uppercase;
        letter-spacing: 1px;
        line-height: 1.4;
        margin-top: 20px;
        text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
    }

    .placar {
        margin-top: auto;
        margin-bottom: 50px;
        text-align: center;
        width: 100%;
        background: rgba(0,0,0,0.2);
        padding: 20px;
        border-radius: 12px;
    }

    .placar-sim, .placar-nao {
        font-size: 42px;
        font-weight: 900;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        margin: 10px 0;
    }

    .placar-sim span { color: #00e000; }
    .placar-nao span { color: #ff3333; }

    /* PAINEL PRINCIPAL (Direita) */
    .main-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
        overflow-y: auto;
        position: relative;
    }

    .voters-grid {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 20px 15px; /* gap vertical e horizontal */
        max-width: 1200px;
        align-content: center;
    }

    /* CARTÃO DO VEREADOR */
    .voter-card {
        width: 190px;
        display: flex;
        flex-direction: column;
        align-items: center;
        filter: drop-shadow(0px 10px 15px rgba(0,0,0,0.3));
    }

    .photo-container {
        width: 100%;
        height: 220px;
        background-color: #ffffff;
        display: flex;
        justify-content: center;
        align-items: flex-end;
        overflow: hidden;
    }

    .photo-container img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: top;
    }

    .vote-bar {
        width: 100%;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        font-weight: 900;
        text-transform: uppercase;
        color: white;
        letter-spacing: 2px;
        background-color: #444; /* Default/Aguardando */
    }

    /* STATUS DE COR */
    .vote-sim { background-color: #00c800; }
    .vote-nao { background-color: #d00000; }
    .vote-aguardando { background-color: #444444; color: #888;} 

    .voter-name {
        margin-top: 8px;
        font-size: 13px;
        font-weight: 400;
        text-transform: uppercase;
        text-align: center;
        letter-spacing: 1px;
    }

    /* WEBSOCKET STATUS */
    .connection-status {
        position: absolute;
        top: 15px;
        right: 20px;
        font-size: 12px;
        color: #666;
    }

    /* BOTÃO DE HISTÓRICO DISCRETO NA ESQUERDA (DENTRO DA SIDEBAR) */
    .btn-historico {
        position: absolute;
        bottom: 15px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(255, 255, 255, 0.1);
        color: rgba(255, 255, 255, 0.7);
        border: 1px solid rgba(255, 255, 255, 0.2);
        padding: 6px 15px;
        border-radius: 20px;
        font-size: 11px;
        cursor: pointer;
        transition: all 0.2s;
        text-transform: uppercase;
        backdrop-filter: blur(5px);
    }
    .btn-historico:hover {
        background: rgba(255, 255, 255, 0.3);
        color: white;
    }

    /* MODAL DE HISTÓRICO */
    .modal-overlay {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(5px);
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
        z-index: 1000;
    }

    .modal-overlay.active {
        opacity: 1;
        pointer-events: all;
    }

    .modal-content {
        background: #2a2a2a;
        width: 100%;
        max-width: 600px;
        max-height: 85vh;
        border-radius: 12px;
        display: flex;
        flex-direction: column;
        box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }

    .modal-header {
        padding: 20px;
        border-bottom: 1px solid #444;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .modal-header h2 { margin: 0; font-size: 18px; }
    .btn-close { background: none; border: none; font-size: 24px; color: #aaa; cursor: pointer; }
    .btn-close:hover { color: white; }

    .modal-body {
        padding: 20px;
        overflow-y: auto;
    }

    .history-card {
        background: #333;
        border-radius: 8px;
        margin-bottom: 15px;
        overflow: hidden;
    }
    .history-card-header {
        display: flex; justify-content: space-between;
        padding: 15px;
        font-weight: bold;
        cursor: pointer;
        user-select: none;
        transition: background 0.2s;
    }
    .history-card-header:hover {
        background: rgba(255, 255, 255, 0.05);
    }
    .history-body {
        display: none;
        padding: 0 15px 15px 15px;
        border-top: 1px solid #444;
        margin-top: 5px;
    }
    .history-voter-row {
        display: flex; justify-content: space-between;
        padding: 8px 10px; background: #222; border-radius: 4px; margin-bottom: 5px;
        font-size: 13px;
    }
    .icon-expand {
        display: inline-block;
        font-size: 10px;
        margin-right: 8px;
        transition: transform 0.2s;
    }
</style>
</head>
<body>

<div class="sidebar">
    <img class="logo" src="imagens/Brasão Original.png" alt="Brasão">
    
    <h1>Câmara Municipal de<br>Espera Feliz-MG</h1>
    
    <div class="placar">
        <div style="font-size: 12px; color:#aaa; margin-bottom: 10px; letter-spacing: 2px;">VOTAÇÃO ATUAL</div>
        <div class="placar-sim">SIM: <span id="total-sim">0</span></div>
        <div class="placar-nao">NÃO: <span id="total-nao">0</span></div>
    </div>

    <!-- O botão discreto agora fica no rodapé da barra lateral -->
    <button class="btn-historico" onclick="openModal()">Ver Histórico</button>
</div>

<div class="main-panel">
    <div class="connection-status" id="ws-status">Conectando...</div>

    <div class="voters-grid" id="voters-grid">
        <!-- A grade será injetada por JS -->
    </div>
</div>

<!-- MODAL DE HISTÓRICO -->
<div class="modal-overlay" id="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Votações Anteriores</h2>
            <button class="btn-close" onclick="closeModal()">&times;</button>
        </div>
        <div class="modal-body" id="history-container"></div>
    </div>
</div>

<script>
    let socket;
    let fallbackTimer;

    // A LISTA DEFINITIVA E FIXA DOS 11 VEREADORES DO PAINEL
    const listaVereadores = [
        "LAIR BOIADEIRO",
        "FILETO",
        "COCÃO DO ESPORTE",
        "SERGINHO SILVESTRE",
        "FERNANDA DO SINDICATO",
        "ROBINHO LACERDA",
        "SANDRINHA DONADIO",
        "PAULINHO DO SALÃO",
        "JOSÉ AUGUSTO",
        "MATUSALÉM",
        "GILMARZINHO"
    ];

    const mapaFotos = {
        "LAIR BOIADEIRO": "Lair.png",
        "FILETO": "Fileto.png",
        "COCÃO DO ESPORTE": "Cocão.png",
        "SERGINHO SILVESTRE": "Serginho.png",
        "FERNANDA DO SINDICATO": "Fernanda.png",
        "ROBINHO LACERDA": "Robinho.png",
        "SANDRINHA DONADIO": "Sandrinha.png",
        "PAULINHO DO SALÃO": "Paulinho.png",
        "JOSÉ AUGUSTO": "Jose.png",
        "MATUSALÉM": "Matusalem.png",
        "GILMARZINHO": "Gilmarzinho.png"
    };

    function imageError(img) {
        img.onerror = null;
        img.src = "https://cdn.pixabay.com/photo/2015/10/05/22/37/blank-profile-picture-973460_1280.png";
    }

    function renderCard(nome, votoValue) {
        let label = "---";
        let colorClass = "vote-aguardando";

        if (votoValue === 1) {
            label = "SIM";
            colorClass = "vote-sim";
        } else if (votoValue === 0) {
            label = "NÃO";
            colorClass = "vote-nao";
        }

        const nomeArquivo = mapaFotos[nome] || "sem_foto.png";

        return '\
            <div class="voter-card">\
                <div class="photo-container">\
                    <img src="imagens/' + nomeArquivo + '" onerror="imageError(this)" alt="' + nome + '">\
                </div>\
                <div class="vote-bar ' + colorClass + '">' + label + '</div>\
                <div class="voter-name">' + nome + '</div>\
            </div>\
        ';
    }

    function renderizarGridVotante(individuais) {
        const grid = document.getElementById("voters-grid");
        let htmlGrid = "";
        
        listaVereadores.forEach(nomeLista => {
            let votoAtual = -1; // -1 = Não Votou / Aguardando
            
            if (Array.isArray(individuais)) {
                // Compara para saber se há um voto registrado da placa ESP32 (Ignora maiusculas/minusculas)
                const regExato = individuais.find(vi => vi.nome.toUpperCase() === nomeLista.toUpperCase());
                if(regExato) {
                    votoAtual = regExato.voto;
                }
            }
            htmlGrid += renderCard(nomeLista, votoAtual);
        });

        // Este bloco aqui vai adicionar no grid qualquer vereador de teste que você configurar no ESP32 ("Gabriel" por ex)
        // se ele não estiver na lista de 11 oficiais, para os testes do Botão
        if (Array.isArray(individuais)) {
            individuais.forEach(vi => {
                const existe = listaVereadores.some(nome => nome.toUpperCase() === vi.nome.toUpperCase());
                if(!existe) {
                    htmlGrid += renderCard(vi.nome, vi.voto);
                }
            });
        }
        
        grid.innerHTML = htmlGrid;
    }

    // Renderiza a base dos 11 assim que a página abre, sem dados do ESP32 (Tudo Aguardando)
    window.onload = () => {
        renderizarGridVotante([]);
        conectar();
    };

    function atualizarTela(dados) {
        if(!dados || !dados.votacoes || dados.votacoes.length === 0) return;

        const indiceAtual = dados.atual;
        const votacaoAtual = dados.votacoes[indiceAtual];
        
        document.getElementById("total-sim").textContent = votacaoAtual.sim;
        document.getElementById("total-nao").textContent = votacaoAtual.nao;

        // Atualizar Painel Principal (Grid) com os dados recebidos!
        renderizarGridVotante(votacaoAtual.individuais);

        // Atualizar Histórico (Modal)
        const histContainer = document.getElementById("history-container");
        let htmlHist = "";
        
        for (let i = dados.votacoes.length - 1; i >= 0; i--) {
            if (i === indiceAtual) continue;
            
            const p = dados.votacoes[i];
            
            let htmlVoters = "";
            const individuais = p.individuais || [];
            
            listaVereadores.forEach(nome => {
                let votoValue = -1;
                const regExato = individuais.find(vi => vi.nome.toUpperCase() === nome.toUpperCase());
                if(regExato) {
                    votoValue = regExato.voto;
                }
                
                let label = "NÃO VOTOU";
                let color = "#888";
                if(votoValue === 1) { label = "SIM"; color = "#00e000"; }
                else if(votoValue === 0) { label = "NÃO"; color = "#ff3333"; }
                
                htmlVoters += '\
                    <div class="history-voter-row">\
                        <span>' + nome + '</span>\
                        <span style="color:' + color + '; font-weight:bold;">' + label + '</span>\
                    </div>';
            });

            htmlHist += '\
                <div class="history-card">\
                    <div class="history-card-header" onclick="toggleHistory(this)">\
                        <div><span class="icon-expand">▶</span> Votação ' + (i + 1) + '</div>\
                        <div>\
                            <span style="color:#00e000; margin-right:15px">SIM: ' + p.sim + '</span>\
                            <span style="color:#ff3333">NÃO: ' + p.nao + '</span>\
                        </div>\
                    </div>\
                    <div class="history-body">' + htmlVoters + '</div>\
                </div>';
        }
        
        histContainer.innerHTML = htmlHist || "<p style='text-align:center; color:#555;'>Nenhuma sessão gravada.</p>";
    }

    function conectar() {
        const ip = window.location.hostname ? window.location.hostname : '192.168.0.183';
        const url = 'ws://' + ip + '/ws';
        
        socket = new WebSocket(url);

        socket.onopen = () => {
             document.getElementById("ws-status").textContent = "Sessão Online";
             document.getElementById("ws-status").style.color = "#00e000";
        };

        socket.onclose = () => {
             document.getElementById("ws-status").textContent = "Conexão perdida. Reconectando...";
             document.getElementById("ws-status").style.color = "#ff3333";
             clearTimeout(fallbackTimer);
             fallbackTimer = setTimeout(conectar, 2000);
        };

        socket.onmessage = (e) => {
            try {
                const data = JSON.parse(e.data);
                atualizarTela(data);
            } catch(ex) { }
        };
    }

    function openModal() { document.getElementById('modal').classList.add('active'); }
    function closeModal() { document.getElementById('modal').classList.remove('active'); }

    function toggleHistory(element) {
        const body = element.nextElementSibling;
        const icon = element.querySelector('.icon-expand');
        if (body.style.display === "block") {
            body.style.display = "none";
            icon.style.transform = "rotate(0deg)";
        } else {
            body.style.display = "block";
            icon.style.transform = "rotate(90deg)";
        }
    }
</script>

</body>
</html>
